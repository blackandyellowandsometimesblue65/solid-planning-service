<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Solid Planning Service – AI Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="app">
  <header class="app-header">
    <div class="brand">
      <div class="brand-text">
        <span>SOLID PLANNING</span>
        <span>SERVICE, INC.</span>
      </div>
    </div>
  </header>

  <main class="app-main">
    <section class="panel panel-left">
      <h2>Project setup</h2>

      <label>
        <span>Client name</span>
        <input id="clientName" type="text" placeholder="e.g. John Smith" />
      </label>

      <label>
        <span>Square footage</span>
        <input id="squareFootage" type="number" placeholder="2200" />
      </label>

      <label>
        <span>Bedrooms</span>
        <input id="bedrooms" type="number" placeholder="3" />
      </label>

      <label>
        <span>Bathrooms</span>
        <input id="bathrooms" type="number" placeholder="2.5" />
      </label>

      <label>
        <span>Garage bays</span>
        <input id="garage" type="number" placeholder="2" />
      </label>

      <button id="btnFullBuild" class="btn primary">One‑click full build</button>
    </section>

    <section class="panel panel-right">
      <h2>Outputs</h2>

      <div class="output-block">
        <h3>Floor plan</h3>
        <div id="floorplanPreview" class="preview"></div>
      </div>

      <div class="output-block">
        <h3>Technical spec</h3>
        <pre id="specOutput" class="spec-output">{}</pre>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
