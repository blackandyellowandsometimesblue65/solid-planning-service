<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solid Planning Service</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">SOLID PLANNING</div>

    <nav class="sidebar-nav">
      <div class="nav-item active">Dashboard</div>
      <div class="nav-item">Projects</div>
      <div class="nav-item">Clients</div>
      <div class="nav-item">Settings</div>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- HEADER -->
    <header class="header">
      <h1>Project Builder</h1>
    </header>

    <!-- INPUT SECTION -->
    <section class="card">
      <h2 class="section-title">Project Setup</h2>

      <div class="input-grid">
        <div class="input-group">
          <label>Client Name</label>
          <input id="clientName" type="text" placeholder="e.g. Smith" />
        </div>

        <div class="input-group">
          <label>Square Footage</label>
          <input id="squareFootage" type="number" placeholder="2200" />
        </div>

        <div class="input-group">
          <label>Bedrooms</label>
          <input id="bedrooms" type="number" placeholder="3" />
        </div>

        <div class="input-group">
          <label>Bathrooms</label>
          <input id="bathrooms" type="text" placeholder="2.5" />
        </div>

        <div class="input-group">
          <label>Garage Bays</label>
          <input id="garageBays" type="number" placeholder="2" />
        </div>
      </div>

      <button id="buildBtn" class="primary-btn">One‑Click Full Build</button>
    </section>

    <!-- OUTPUT SECTION -->
    <section class="output-grid">

      <div class="card">
        <h2 class="section-title">Floor Plan</h2>
        <div id="floorplanOutput" class="output-box">No output yet</div>
      </div>

      <div class="card">
        <h2 class="section-title">Technical Spec</h2>
        <pre id="techSpecOutput" class="output-box">No output yet</pre>
      </div>

    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
